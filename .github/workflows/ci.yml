name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Python lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: codeintel
          POSTGRES_PASSWORD: codeintel
          POSTGRES_DB: codeintel
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U codeintel -d codeintel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://codeintel:codeintel@localhost:5434/codeintel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import time
          import psycopg
          for _ in range(30):
              try:
                  psycopg.connect("postgresql://codeintel:codeintel@localhost:5434/codeintel").close()
                  break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Postgres not ready")
          PY

      - name: Alembic upgrade head
        run: alembic upgrade head

      - name: Ruff
        run: ruff check .

      - name: MyPy
        run: mypy app

      - name: Pytest
        run: pytest -q --randomly-seed=4242

  web:
    name: Frontend typecheck, lint, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Production build
        run: npm run build

  docker:
    name: Docker build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t codeintel-api:ci .

      - name: Build worker image
        run: docker build -f apps/worker/Dockerfile -t codeintel-worker:ci .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t codeintel-web:ci .
