services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: codeintel
      POSTGRES_PASSWORD: codeintel
      POSTGRES_DB: codeintel
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeintel -d codeintel"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://codeintel:codeintel@postgres:5432/codeintel
      APP_ENV: local
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://codeintel:codeintel@postgres:5432/codeintel
      APP_ENV: local
      WORKER_ID: worker-1
      JOB_LEASE_SECONDS: "60"
      JOB_RETRY_DELAY_SECONDS: "30"
      WORKER_POLL_INTERVAL_SECONDS: "2"
      GIT_CLONE_TIMEOUT_SECONDS: "120"
      GIT_CLONE_MAX_BYTES: "52428800"
      GIT_CLONE_BASE_DIR: /tmp/codeintel-clones
      # Propagate for /health-style logs inside the worker process.
      CODEINTEL_GIT_SHA: ${CODEINTEL_GIT_SHA:-local}
    depends_on:
      postgres:
        condition: service_healthy
    # Compose Watch: restart worker when indexing/API code changes so local
    # `docker compose watch` does not leave a stale indexer running.
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api/app
          target: /opt/codeintel/api/app
        - action: sync+restart
          path: ./apps/worker/worker
          target: /opt/codeintel/worker/worker

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
